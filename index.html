<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>CS2 Günlük</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginPage">
  <h1>CS2 Günlük</h1>
  <input type="password" id="password" placeholder="Şifre">
  <button onclick="login()">Giriş</button>
</div>

<div id="app" class="hidden">
  <h1>🎮 CS2 Günlük</h1>

  <div class="form">
    <input type="date" id="date">
    <input type="time" id="time">
    <textarea id="note" placeholder="Bugün neler oldu?"></textarea>
    <input type="text" id="video" placeholder="YouTube video linki">
    <button onclick="saveEntry()">Kaydet</button>
  </div>

  <h2>Kayıtlar</h2>
  <div id="entries"></div>
</div>

<script src="app.js"></script>
</body>
</html>
