<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Melike ve ali mertin cs2 günlüğü</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Melike ve ali mertin cs2 günlüğü</h1>

<div class="menu">
  <button onclick="showPage('journal')">Maç kazanma oranı</button>
  <button onclick="showPage('notes')">Günlük maçlar</button>
  <button onclick="showPage('clips')">En iyi vuruşlar</button>
</div>

<!-- GÜNLÜK SAYFASI -->
<div id="journal" class="page">
  <h2>Günlük Kayıt</h2>
  <input type="date" id="j_date">
  <input type="time" id="j_time">
  <textarea id="j_note" placeholder="Bugün CS2'de neler oldu?"></textarea>
  <button onclick="saveJournal()">Kaydet</button>

  <div id="journalList"></div>
</div>

<!-- NOTLAR SAYFASI -->
<div id="notes" class="page hidden">
  <h2>Notlar</h2>
  <textarea id="noteText" placeholder="Kalıcı not ekle"></textarea>
  <button onclick="saveNote()">Not Kaydet</button>

  <div id="notesList"></div>
</div>

<!-- KLİPLER SAYFASI -->
<div id="clips" class="page hidden">
  <h2>Melike ve ali mertin cs2 günlüğü</h2>
  <input type="text" id="clipLink" placeholder="YouTube klip linki">
  <button onclick="saveClip()">Klip Kaydet</button>

  <div id="clipList"></div>
</div>

<script src="app.js"></script>
</body>
</html>
